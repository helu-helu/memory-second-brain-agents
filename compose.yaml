services:
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: second-brain-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
    name: qdrant_storage
    external: true
