app:
  api_key_name: "X-API-Key"
  api_server:
    host: "127.0.0.1"
    port: 8001
    base_url: "http://127.0.0.1:8001"

rag:
  mode: "server"
  docs_dir: "./docs"
  watch_dir: "./docs/daily"
  workflows_dir: "./docs/Workflows"
  skills_dir: "./.agents/skills"
  db_path: "./db/qdrant_rag"
  host: "127.0.0.1"
  port: 6333
  prefer_grpc: true
  collection_name: "personal_knowledge_base"
  embedding_model: "BAAI/bge-small-en-v1.5"

model_registry:
  available_models:
    - id: "qwen3:4b"
      tier: "standard"
      features: ["tool_calling", "structured_output"]
    - id: "qwen2.5-coder:7b"
      tier: "reasoning"
      features: ["tool_calling", "structured_output", "complex_planning"]
    - id: "gemini-3.1-flash-lite"
      tier: "standard"
      features: ["tool_calling", "structured_output"]
    - id: "gemini-3.5-flash"
      tier: "reasoning"
      features: ["tool_calling", "structured_output", "complex_planning"]
    - id: "openrouter/free"
      tier: "standard"
      features: ["tool_calling", "structured_output"]
  routing:
    default_strategy: "local_first"
  llm:
    provider: "ollama"
    model: "qwen3:4b"
  top_k: 3

memory:
  version: "v1.1"
  history_db_path: "./db/mem0_history.db"
  qdrant:
    mode: "server"
    path: "./db/qdrant_mem0"
    host: "127.0.0.1"
    port: 6333
    collection_name: "personal_agent_memory"
    embedding_model_dims: 384
  llm:
    provider: "ollama"
    model: "qwen3:4b"
    temperature: 0
  embedder:
    provider: "huggingface"
    model: "BAAI/bge-small-en-v1.5"
